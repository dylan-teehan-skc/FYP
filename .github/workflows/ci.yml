name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install ruff
      - run: ruff check demo/agent-runtime/
      - run: ruff check demo/mcp-tool-server/
      - run: ruff check sdk/src/ sdk/tests/
      - run: ruff check platform/collector/src/ platform/collector/tests/
      - run: ruff check platform/analysis/src/ platform/analysis/tests/

  test-agent-runtime:
    name: Test Agent Runtime
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        working-directory: demo/agent-runtime
        run: |
          python -m venv .venv
          .venv/bin/pip install -e ../../sdk
          .venv/bin/pip install -e ".[dev]"
      - name: Run tests
        working-directory: demo/agent-runtime
        run: .venv/bin/python -m pytest tests/ -v --cov=. --cov-report=term-missing
      - name: Check coverage
        working-directory: demo/agent-runtime
        run: .venv/bin/python -m pytest tests/ --cov=agent --cov=mcp --cov-fail-under=90 -q

  test-mcp-server:
    name: Test MCP Tool Server
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        working-directory: demo/mcp-tool-server
        run: |
          python -m venv .venv
          .venv/bin/pip install -e ".[dev]"
      - name: Run tests
        working-directory: demo/mcp-tool-server
        run: .venv/bin/python -m pytest tests/ -v --cov=. --cov-report=term-missing

  test-sdk:
    name: Test SDK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        working-directory: sdk
        run: |
          python -m venv .venv
          .venv/bin/pip install -e ".[dev]"
      - name: Run tests
        working-directory: sdk
        run: .venv/bin/python -m pytest tests/ -v --cov=workflow_optimizer --cov-report=term-missing
      - name: Check coverage
        working-directory: sdk
        run: .venv/bin/python -m pytest tests/ --cov=workflow_optimizer --cov-fail-under=90 -q

  test-collector:
    name: Test Collector Service
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        working-directory: platform/collector
        run: |
          python -m venv .venv
          .venv/bin/pip install -e ".[dev]"
      - name: Run tests
        working-directory: platform/collector
        run: .venv/bin/python -m pytest tests/ -v --cov=collector --cov-report=term-missing
      - name: Check coverage
        working-directory: platform/collector
        run: .venv/bin/python -m pytest tests/ --cov=collector --cov-fail-under=90 -q

  test-dashboard:
    name: Test Dashboard
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install dependencies
        working-directory: dashboard
        run: npm ci
      - name: Run tests
        working-directory: dashboard
        run: npm test

  test-analysis:
    name: Test Analysis Engine
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        working-directory: platform/analysis
        run: |
          python -m venv .venv
          .venv/bin/pip install -e ".[dev]"
      - name: Run tests
        working-directory: platform/analysis
        run: .venv/bin/python -m pytest tests/ -v --cov=analysis --cov-report=term-missing
      - name: Check coverage
        working-directory: platform/analysis
        run: .venv/bin/python -m pytest tests/ --cov=analysis --cov-fail-under=90 -q
