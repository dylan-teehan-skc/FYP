name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install ruff
      - run: ruff check demo/agent-runtime/
      - run: ruff check demo/mcp-tool-server/

  test-agent-runtime:
    name: Test Agent Runtime
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        working-directory: demo/agent-runtime
        run: |
          python -m venv .venv
          .venv/bin/pip install -e ".[dev]"
      - name: Run tests
        working-directory: demo/agent-runtime
        run: .venv/bin/python -m pytest tests/ -v --cov=. --cov-report=term-missing
      - name: Check coverage
        working-directory: demo/agent-runtime
        run: .venv/bin/python -m pytest tests/ --cov=agent --cov=mcp --cov-fail-under=90 -q

  test-mcp-server:
    name: Test MCP Tool Server
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        working-directory: demo/mcp-tool-server
        run: |
          python -m venv .venv
          .venv/bin/pip install -e ".[dev]"
      - name: Run tests
        working-directory: demo/mcp-tool-server
        run: .venv/bin/python -m pytest tests/ -v --cov=. --cov-report=term-missing
